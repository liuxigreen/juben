# 都市复仇题材规则包
# 适用于：重生复仇、商战、都市逆袭
# 来源：从真实爆款中提炼的硬约束

name: urban-revenge
description: 都市复仇反套路 — 现代商战的真实逻辑

world_setting:
  time_period: "当代"
  technology_level: "当代科技"
  social_structure: "商业社会"

causal_constraints:
  - "商业决策必须有合理的逻辑链，不能凭空变出资源"
  - "融资、股权、对赌协议等必须符合现实商业逻辑"
  - "法律程序有时间成本，不能一告就赢"
  - "人脉关系需要经营，不能一通电话就搞定所有人"
  - "金钱不能解决所有问题，但没钱确实寸步难行"

anti_cliche_blacklist:
  # === 商战烂梗 ===
  - "掏出黑卡/无限额信用卡让全场震惊——有钱不是爽点，怎么赚到的才是"
  - "在董事会上拿出一份文件秒杀所有对手——商战不是一回合制游戏"
  - "反派商人的计划永远被主角提前知道——信息来源要合理"
  - "主角一通电话就让对方公司倒闭——商业不是黑社会"
  - "拍卖会上疯狂加价只为打脸——资本是有成本的"

  # === 重生烂梗 ===
  - "重生后记住所有彩票号码/股票代码——蝴蝶效应会让大部分失效"
  - "重生后对前世仇人当众打脸——打草惊蛇是最蠢的策略"
  - "重生者无所不能，每次都精准预判——记忆会模糊，不是GPS"
  - "重生后身边人性格突变——前世和今生的人应该是同一个人"

  # === 身份烂梗 ===
  - "主角其实是某豪门失散多年的继承人——身世反转靠DNA不靠能力"
  - "扮猪吃老虎被识破后众人震惊——反复隐藏/揭露身份是注水"
  - "退婚/解除合同后对方跪求——商业世界没有'后悔药'这个爽点"
