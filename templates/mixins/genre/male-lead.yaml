# 男频通用反套路规则包
# 适用于：男频爽文、系统流、升级打怪
# 来源：从真实爆款和烂片中提炼

name: male-lead
description: 男频核心反套路 — 爽要有逻辑，不是无脑碾压

core_principles:
  - "爽感来源：用智谋碾压，不是用外挂碾压"
  - "升级有代价，能力越大责任越大"
  - "配角不是工具人，每个人都有自己的动机"
  - "反派要聪明，蠢反派赢了也没成就感"

anti_cliche_blacklist:
  # === 系统/金手指烂梗 ===
  - "系统发布任务就给奖励，不做就死——系统不是老板，不能这么霸道"
  - "金手指无任何代价——没有代价的能力不值得写"
  - "主角升级速度碾压所有人——合理解释为什么是他而不是别人"
  - "签到/打卡就能变强——这不是成长，这是摸鱼"

  # === 打脸烂梗 ===
  - "被当众羞辱时小弟赶到下跪——反转要有铺垫，不能靠人数"
  - "反派死于话多，主动告诉主角关键信息——聪明的反派不会这样"
  - "主角每次危机都有贵人相助——巧合不能当剧情引擎"
  - "退婚/退学/被开除后对方后悔——被抛弃→逆袭的套路太老了"

  # === 世界观烂梗 ===
  - "实力等级森严但主角一路越级挑战——那等级制度还有什么意义？"
  - "拍卖会/比武大会/宗门大比——这三个场景占了80%的网文字数"
  - "隐世老人其实是绝世高手——逢人就教功夫的老人不可信"
