# 重生复仇骨架 — PacingCards模板
# 适用于：重生、穿越、时间回溯题材
# 核心节奏：信息差驱动的精密操盘

name: rebirth-revenge
description: 重生复仇卡点骨架 — 信息差节奏公式

pacing_cards:
  - label: "3s_Hook"
    word_range: [0, 100]
    rule: "动词+特写开局。禁止背景铺垫。必须在前100字内出现一个具体的感官冲击（坠落感/疼痛/重生的眩晕）"
    emotion: "震惊/恐惧"
    cliffhanger_type: null

  - label: "15s_Retention"
    word_range: [300, 500]
    rule: "爆出核心信息差——主角知道但其他人不知道的关键事实。这是留住读者的炸弹"
    emotion: "掌控感/暗爽"

  - label: "Mini_Tension"
    word_range: [600, 800]
    rule: "一次小规模紧张对峙或试探，主角不能暴露自己知道太多"
    emotion: "紧张/压抑"

  - label: "Emotion_Dip"
    word_range: [1000, 1200]
    rule: "情绪下压——回忆前世的痛苦/看到还活着的已故亲人/意识到代价"
    emotion: "心痛/愤怒"

  - label: "50s_Cliffhanger"
    word_range: [1700, 2000]
    rule: "断崖。必须在最后一句植入一个具体的未回答问题"
    emotion: "悬念/紧迫"
    cliffhanger_type: "Reveal"
